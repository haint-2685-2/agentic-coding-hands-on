<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="default avatar">
  <!-- background -->
  <rect width="80" height="80" fill="#FFE6A8"/>
  <!-- left ear -->
  <polygon points="14,28 30,32 22,10" fill="#E89B4A"/>
  <polygon points="17,25 27,30 23,14" fill="#FFB5C2"/>
  <!-- right ear -->
  <polygon points="66,28 50,32 58,10" fill="#E89B4A"/>
  <polygon points="63,25 53,30 57,14" fill="#FFB5C2"/>
  <!-- head -->
  <ellipse cx="40" cy="50" rx="24" ry="22" fill="#F4C57A"/>
  <!-- cheek blush -->
  <ellipse cx="24" cy="55" rx="4" ry="2.4" fill="#F69BB1" opacity="0.65"/>
  <ellipse cx="56" cy="55" rx="4" ry="2.4" fill="#F69BB1" opacity="0.65"/>
  <!-- eyes (closed-happy: small arcs) -->
  <path d="M 28 47 Q 32 50 36 47" stroke="#2D3436" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 44 47 Q 48 50 52 47" stroke="#2D3436" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M 36 55 Q 40 59 44 55 Z" fill="#F69BB1"/>
  <!-- mouth -->
  <path d="M 36 58 Q 38 62 40 58" stroke="#2D3436" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 40 58 Q 42 62 44 58" stroke="#2D3436" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="18" y1="56" x2="28" y2="57" stroke="#2D3436" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="18" y1="60" x2="28" y2="60" stroke="#2D3436" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="62" y1="56" x2="52" y2="57" stroke="#2D3436" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="62" y1="60" x2="52" y2="60" stroke="#2D3436" stroke-width="1.4" stroke-linecap="round"/>
</svg>
